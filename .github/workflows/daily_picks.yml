name: 🏒 Daily First Goalscorer Picks

on:
  schedule:
    - cron: '0 12 * * *'   # 7:00 AM ET = 12:00 UTC
  workflow_dispatch:
    inputs:
      date:
        description: 'Date (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''
      top:
        description: 'Number of picks'
        required: false
        default: '5'

jobs:
  predict:
    name: Generate picks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          if [ -f data/ml_model.pkl ]; then
            pip install -r requirements-ml.txt
          fi

      - name: Validate model
        run: python -m nhl_predictor.cli validate

      - name: Resolve target date
        id: date
        run: |
          INPUT="${{ github.event.inputs.date }}"
          if [ -n "$INPUT" ]; then
            echo "target=$INPUT" >> $GITHUB_OUTPUT
          else
            echo "target=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Check NHL schedule
        run: |
          TARGET="${{ steps.date.outputs.target }}"
          echo "Checking NHL schedule for $TARGET..."
          curl -s "https://api-web.nhle.com/v1/schedule/$TARGET" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          games = []
          for day in data.get('gameWeek', []):
              if day.get('date') == '$TARGET':
                  games = [g for g in day.get('games', []) if g.get('gameType', 2) in (2, 3)]
          print(f'Games found: {len(games)}')
          for g in games:
              print(f'  {g[\"awayTeam\"][\"abbrev\"]} @ {g[\"homeTeam\"][\"abbrev\"]}')
          if not games:
              print('WARNING: No games scheduled -- picks file will not be created')
          "

      - name: Generate picks
        id: picks
        run: |
          TARGET="${{ steps.date.outputs.target }}"
          TOP="${{ github.event.inputs.top || '5' }}"
          DATE_ARG="--date $TARGET"

          echo "Generating picks for $TARGET (top $TOP)..."

          # Run prediction -- table output to logs for visibility
          python -m nhl_predictor.cli predict $DATE_ARG --top $TOP

          # Run again saving JSON to picks/
          python -m nhl_predictor.cli predict $DATE_ARG --top $TOP --output json --save

          # Verify the file was created
          PICKS_FILE="picks/$TARGET.json"
          if [ -f "$PICKS_FILE" ]; then
            echo "picks_created=true" >> $GITHUB_OUTPUT
            echo "picks_file=$PICKS_FILE" >> $GITHUB_OUTPUT
            echo ""
            echo "=== picks/$TARGET.json ==="
            cat "$PICKS_FILE"
          else
            echo "picks_created=false" >> $GITHUB_OUTPUT
            echo "WARNING: picks file was not created -- likely no games today or API error"
          fi

      - name: Commit picks
        if: steps.picks.outputs.picks_created == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📊 Picks ${{ steps.date.outputs.target }}"
          file_pattern: 'picks/*.json'
          commit_user_name: 'nhl-picks-bot'
          commit_user_email: 'nhl-picks-bot@users.noreply.github.com'

      - name: Upload artifact
        if: steps.picks.outputs.picks_created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: picks-${{ steps.date.outputs.target }}
          path: picks/${{ steps.date.outputs.target }}.json
          retention-days: 90

      - name: No games today
        if: steps.picks.outputs.picks_created != 'true'
        run: |
          echo "No picks file generated for ${{ steps.date.outputs.target }}."
          echo "This is expected on days with no NHL games."

  # --- Track yesterday's accuracy -------------------------------------------
  track:
    name: Track yesterday's accuracy
    runs-on: ubuntu-latest
    needs: predict

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Evaluate yesterday
        run: python -m nhl_predictor.cli track

      - name: Commit accuracy log
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📈 Accuracy log update"
          file_pattern: 'data/accuracy_log.jsonl'
          commit_user_name: 'nhl-picks-bot'
          commit_user_email: 'nhl-picks-bot@users.noreply.github.com'
  deploy:
      name: Deploy GitHub Pages
      needs: [predict, track]
      if: always() && needs.predict.outputs.picks_created == 'true'
      uses: ./.github/workflows/pages.yml
      permissions:
        contents: read
        pages: write
        id-token: write
