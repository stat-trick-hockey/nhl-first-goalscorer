name: Train ML Model

on:
  workflow_dispatch:
    inputs:
      seasons:
        description: 'Seasons to scrape (comma-separated, e.g. 20232024,20242025,20252026). Leave blank for all.'
        required: false
        default: ''
      cv:
        description: 'Run cross-validation during training?'
        required: false
        default: 'false'
      feature_importance:
        description: 'Print feature importance after training?'
        required: false
        default: 'true'

env:
  PYTHONUNBUFFERED: "1"

jobs:
  train:
    name: Scrape + Train
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-ml.txt

      - name: Smoke test NHL API
        run: PYTHONPATH=. python3 scripts/smoke_test.py

      - name: Scrape historical data
        timeout-minutes: 60
        run: |
          SEASONS="${{ github.event.inputs.seasons }}"
          echo "=== bash: about to call Python ==="
          if [ -n "$SEASONS" ]; then
            python -m nhl_predictor.cli scrape --season ${SEASONS//,/ --season } --delay 0.5
          else
            python -m nhl_predictor.cli scrape --delay 0.5
          fi
          echo "=== bash: Python finished ==="

      - name: Show training data size
        run: |
          if [ -f data/training_data.csv ]; then
            echo "Rows scraped: $(wc -l < data/training_data.csv)"
          else
            echo "ERROR: training_data.csv not found"
            exit 1
          fi

      - name: Train model
        timeout-minutes: 20
        run: |
          CV_FLAG=""
          FI_FLAG=""
          [ "${{ github.event.inputs.cv }}" = "true" ] && CV_FLAG="--cv"
          [ "${{ github.event.inputs.feature_importance }}" = "true" ] && FI_FLAG="--feature-importance"
          python -m nhl_predictor.cli train $CV_FLAG $FI_FLAG

      - name: Confirm model saved
        run: |
          if [ -f data/ml_model.pkl ]; then
            echo "Model saved: $(du -h data/ml_model.pkl | cut -f1)"
          else
            echo "ERROR: ml_model.pkl not found"
            exit 1
          fi

      - name: Commit model + training data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Train ML model"
          file_pattern: 'data/ml_model.pkl data/training_data.csv'
          commit_user_name: 'nhl-picks-bot'
          commit_user_email: 'nhl-picks-bot@users.noreply.github.com'
