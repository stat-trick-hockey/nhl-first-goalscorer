name: 🏒 Daily First Goalscorer Picks

on:
  schedule:
    - cron: '0 12 * * *'   # 7:00 AM ET = 12:00 UTC
  workflow_dispatch:
    inputs:
      date:
        description: 'Date (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''
      top:
        description: 'Number of picks'
        required: false
        default: '5'

jobs:
  predict:
    name: Generate picks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # Install ML deps if model file exists
          if [ -f data/ml_model.pkl ]; then
            pip install -r requirements-ml.txt
          fi

      - name: Validate model
        run: python -m nhl_predictor.cli validate

      - name: Generate picks
        id: picks
        run: |
          DATE="${{ github.event.inputs.date }}"
          TOP="${{ github.event.inputs.top || '5' }}"
          DATE_ARG=""
          if [ -n "$DATE" ]; then DATE_ARG="--date $DATE"; fi

          TARGET=$(python3 -c "
          d = '${{ github.event.inputs.date }}'
          print(d if d else __import__('datetime').datetime.today().strftime('%Y-%m-%d'))
          ")
          echo "target_date=$TARGET" >> $GITHUB_OUTPUT

          # JSON to file + table to logs
          python -m nhl_predictor.cli predict $DATE_ARG --top $TOP --output json --save
          python -m nhl_predictor.cli predict $DATE_ARG --top $TOP

      - name: Commit picks
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📊 Picks ${{ steps.picks.outputs.target_date }}"
          file_pattern: 'picks/*.json'
          commit_user_name: 'nhl-picks-bot'
          commit_user_email: 'nhl-picks-bot@users.noreply.github.com'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: picks-${{ steps.picks.outputs.target_date }}
          path: picks/${{ steps.picks.outputs.target_date }}.json
          retention-days: 90

  # ── Track yesterday's accuracy after today's picks ────────────────────────
  track:
    name: Track yesterday's accuracy
    runs-on: ubuntu-latest
    needs: predict

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main    # pull latest (includes newly committed picks)

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Evaluate yesterday
        run: python -m nhl_predictor.cli track

      - name: Commit accuracy log
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📈 Accuracy log update"
          file_pattern: 'data/accuracy_log.jsonl'
          commit_user_name: 'nhl-picks-bot'
          commit_user_email: 'nhl-picks-bot@users.noreply.github.com'
