name: Daily First Goalscorer Picks

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''
      top:
        description: 'Number of picks'
        required: false
        default: '5'

jobs:
  predict:
    name: Generate picks
    runs-on: ubuntu-latest
    outputs:
      target_date: ${{ steps.date.outputs.target }}
      prior_date: ${{ steps.date.outputs.prior }}
      picks_created: ${{ steps.picks.outputs.picks_created }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          if [ -f data/ml_model.pkl ]; then
            pip install -r requirements-ml.txt
          fi

      - name: Validate model
        run: python -m nhl_predictor.cli validate

      - name: Resolve target date
        id: date
        run: |
          INPUT="${{ github.event.inputs.date }}"
          if [ -n "$INPUT" ]; then
            echo "target=$INPUT" >> $GITHUB_OUTPUT
            echo "prior=$(date -d "$INPUT - 1 day" +%Y-%m-%d)" >> $GITHUB_OUTPUT
          else
            echo "target=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
            echo "prior=$(date -u -d '1 day ago' +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Check NHL schedule
        run: |
          TARGET="${{ steps.date.outputs.target }}"
          echo "Checking NHL schedule for $TARGET..."
          curl -s "https://api-web.nhle.com/v1/schedule/$TARGET" > /tmp/schedule.json
          python3 scripts/check_schedule.py "$TARGET"

      - name: Generate picks
        id: picks
        run: |
          TARGET="${{ steps.date.outputs.target }}"
          TOP="${{ github.event.inputs.top || '5' }}"
          echo "Generating picks for $TARGET (top $TOP)..."
          python -m nhl_predictor.cli predict --date $TARGET --top $TOP
          python -m nhl_predictor.cli predict --date $TARGET --top $TOP --output json --save
          PICKS_FILE="picks/$TARGET.json"
          if [ -f "$PICKS_FILE" ]; then
            echo "picks_created=true" >> $GITHUB_OUTPUT
            cat "$PICKS_FILE"
          else
            echo "picks_created=false" >> $GITHUB_OUTPUT
            echo "WARNING: picks file was not created"
          fi

      - name: Commit picks
        if: steps.picks.outputs.picks_created == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Picks ${{ steps.date.outputs.target }}"
          file_pattern: 'picks/*.json anytime/*.json'
          commit_user_name: 'nhl-picks-bot'
          commit_user_email: 'nhl-picks-bot@users.noreply.github.com'

      - name: Upload artifact
        if: steps.picks.outputs.picks_created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: picks-${{ steps.date.outputs.target }}
          path: picks/${{ steps.date.outputs.target }}.json
          retention-days: 90

      - name: No games
        if: steps.picks.outputs.picks_created != 'true'
        run: echo "No picks for ${{ steps.date.outputs.target }} -- no games or API error."

  track:
    name: Track accuracy
    runs-on: ubuntu-latest
    needs: predict

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest (picks commit may have moved HEAD)
        run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Evaluate prior day picks
        run: |
          echo "Evaluating picks for ${{ needs.predict.outputs.prior_date }}..."
          python -m nhl_predictor.cli track --date ${{ needs.predict.outputs.prior_date }}

      - name: Commit accuracy log
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Accuracy log ${{ needs.predict.outputs.prior_date }}"
          file_pattern: 'data/accuracy_log.jsonl'
          commit_user_name: 'nhl-picks-bot'
          commit_user_email: 'nhl-picks-bot@users.noreply.github.com'

  deploy:
    name: Deploy GitHub Pages
    needs: [predict, track]
    if: always() && needs.predict.outputs.picks_created == 'true'
    uses: ./.github/workflows/pages.yml
    permissions:
      contents: read
      pages: write
      id-token: write
